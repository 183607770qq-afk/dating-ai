# 应用配置
spring.application.name=dating-ai-backend
server.port=8081

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/dating_ai_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# application.properties
# ??????
embedding.api.enabled=true
embedding.api.url=https://api.openai.com/v1/embeddings
embedding.api.key=your-openai-api-key
embedding.model=text-embedding-ada-002
embedding.dimension=1536

# Milvus??
milvus.host=localhost
milvus.port=19530
milvus.collection.name=knowledge_embeddings
## Milvus配置
#milvus.host=localhost
#milvus.port=19530

# LLM配置
llm.api.url=https://api.deepseek.com/v1/chat/completions
llm.api.key=${LLMAPIKEY}

# 安全配置
jwt.secret=dev-secret-key-1234567890
jwt.expiration=86400000

# CORS配置
spring.servlet.multipart.enabled=true
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
