# 应用配置
spring.application.name=dating-ai-backend
server.port=8080

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/dating_ai_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 嵌入模型配置 - 使用Ollama
embedding.api.enabled=true
embedding.api.url=http://localhost:11434/api/embeddings
embedding.model=qwen3-vl:4b
embedding.dimension=1024

# 嵌入模型配置 - DeepSeek (服务器使用)
# embedding.api.url=https://api.openai.com/v1/embeddings
# embedding.api.key=your-openai-api-key
# embedding.model=text-embedding-ada-002
# embedding.dimension=1536

# Milvus配置
milvus.host=localhost
milvus.port=19530

# LLM配置 - 使用Ollama
llm.provider=langchain4j
llm.api.url=http://localhost:11434/api/chat
llm.base-url=http://localhost:11434
llm.model=qwen3-vl:4b
llm.temperature=0.7
llm.timeout=PT60S

# LLM配置 - DeepSeek (服务器使用)
# llm.api.url=https://api.deepseek.com/v1/chat/completions
# llm.api.key=${LLMAPIKEY}
# llm.model=deepseek-chat

# 安全配置
jwt.secret=dev-secret-key-1234567890
jwt.expiration=86400000

# CORS配置
spring.servlet.multipart.enabled=true
spring.mvc.cors.allowed-origins=*
spring.mvc.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.mvc.cors.allowed-headers=*
